<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あつあつリカーリカ - 電話する</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    padding: 28px 24px;
    overflow: hidden;
  }

  .bg-photo {
    position: fixed;
    inset: 0;
    z-index: -2;
  }

  .bg-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(180deg, rgba(20,16,14,0.15) 0%, rgba(20,16,14,0.25) 45%, rgba(15,11,9,0.78) 100%);
  }

  .top-logo {
    position: absolute;
    top: 28px;
    left: 24px;
    width: 64px;
    filter: drop-shadow(0 3px 10px rgba(0,0,0,0.5));
  }

  .top-logo img {
    width: 100%;
    height: auto;
    display: block;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #e3b272;
    margin-bottom: 8px;
    font-weight: 500;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .shop-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fdf8f2;
    line-height: 1.4;
    margin-bottom: 4px;
    white-space: nowrap;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .sub {
    font-size: 12px;
    color: #d9c7ba;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .call-button {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    background: linear-gradient(135deg, #c98a4b, #a85c2e);
    color: #fff;
    padding: 26px 24px;
    border-radius: 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .call-button:active {
    transform: scale(0.97);
    box-shadow: 0 8px 18px rgba(0,0,0,0.35);
  }

  .icon {
    width: 28px;
    height: 28px;
  }

  .call-text {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .number {
    font-family: 'Shippori Mincho', serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .hint {
    margin-top: 16px;
    font-size: 11px;
    color: #c9b9ac;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
</style>
</head>
