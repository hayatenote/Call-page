<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あつあつリカーリカ - 電話する</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 30% 20%, #4a1f2b 0%, #2b1014 60%, #1a0a0c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .label {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: #d6a86f;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .shop-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 30px;
    font-weight: 700;
    color: #f5e9dc;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .sub {
    font-size: 13px;
    color: #b88a78;
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }

  .call-button {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    background: linear-gradient(135deg, #c98a4b, #a85c2e);
    color: #1a0a0c;
    padding: 28px 24px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(168, 92, 46, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .call-button:active {
    transform: scale(0.97);
    box-shadow: 0 6px 16px rgba(168, 92, 46, 0.3);
  }

  .icon {
    width: 30px;
    height: 30px;
  }

  .call-text {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  .number {
    font-family: 'Shippori Mincho', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .hint {
    margin-top: 24px;
    font-size: 11px;
    color: #7a5448;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="label">RESERVATION</div>
    <div class="shop-name">あつあつ<br>リカーリカ</div>
    <div class="sub">ご予約・お問い合わせ</div>

    <a href="tel:08048582233" class="call-button">
      <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.62 10.79C8.06 13.62 10.38 15.93 13.21 17.38L15.41 15.18C15.69 14.9 16.08 14.82 16.43 14.93C17.55 15.3 18.75 15.5 20 15.5C20.55 15.5 21 15.95 21 16.5V20C21 20.55 20.55 21 20 21C10.61 21 3 13.39 3 4C3 3.45 3.45 3 4 3H7.5C8.05 3 8.5 3.45 8.5 4C8.5 5.25 8.7 6.45 9.07 7.57C9.18 7.92 9.1 8.31 8.82 8.59L6.62 10.79Z" fill="#1a0a0c"/>
      </svg>
      <span class="call-text">タップして電話をかける</span>
      <span class="number">080-4858-2233</span>
    </a>

    <div class="hint">営業時間内にお電話ください</div>
  </div>
</body>
</html>
